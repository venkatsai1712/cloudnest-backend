services:
  postgres:
    image: postgres:17
    container_name: postgres

    environment:
      POSTGRES_DB: CloudNest
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}

    ports:
      - "5432:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d CloudNest"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2026-05-21T18-40-36Z
    container_name: minio

    command: server /data --console-address ":9001"

    environment:
      MINIO_ROOT_USER: ${MINIO_USERNAME:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-change-me}

    ports:
      - "9000:9000"
      - "9001:9001"

    volumes:
      - minio-data:/data

    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: cloudnest

    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy

    ports:
      - "8080:8080"

    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/CloudNest
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      MINIO_ENDPOINT: http://minio:9000
      MINIO_USERNAME: ${MINIO_USERNAME:-minioadmin}
      MINIO_PASSWORD: ${MINIO_PASSWORD:-change-me}
      MINIO_BUCKET: ${MINIO_BUCKET:-uploads}

    volumes:
      - ./uploads:/app/uploads

volumes:
  postgres-data:
  minio-data:
